[ga]
# Maximum number of strategies allowed for Player A.
population_size_A = 244

# Maximum number of strategies allowed for Player B.
population_size_B = 244

# Minimum observed length for gene-table strategies. For first-pattern this is
# used as the minimum random pattern length.
observed_length_min = 3

# Maximum observed length for gene-table strategies. For first-pattern this is
# used as the maximum random pattern length.
observed_length_max = 12

# Target choice range is only used by gene-table strategies. For first-pattern,
# 0 means unbounded and no artificial range cap is applied.
target_choice_range_min = 0

# Maximum target range for generated gene-table strategies. Keep this 0 while
# default_strategy_type is "first-pattern".
target_choice_range_max = 0

# Random observed-length range for generated first-pattern strategies and seed
# strategies that omit observed_length. 0 means unbounded observation.
first_pattern_observed_length_min = 0
first_pattern_observed_length_max = 100

# Random fallback-index range for generated first-pattern strategies and seed
# strategies that omit fallback_index. Used when the pattern is absent. Seed
# strategies can still set fallback_index explicitly, and mutation may evolve it.
first_pattern_fallback_index_min = 0
first_pattern_fallback_index_max = 10

# Random index-offset range for generated first-pattern strategies and seed
# strategies that omit index_offset. When the requested pattern occurrence is
# found, the target index is occurrence index + index_offset, clamped into the
# sequence.
first_pattern_index_offset_min = -10
first_pattern_index_offset_max = 10

# Random occurrence-number range for generated first-pattern strategies. Seed
# strategies default to 1 when occurrence_number is omitted. 1 means first
# occurrence, 2 means second occurrence.
first_pattern_occurrence_min = 1
first_pattern_occurrence_max = 2

# Random block-size range for block-lookup strategies. Mutation can evolve block
# size within this inclusive range.
block_lookup_block_size_min = 1
block_lookup_block_size_max = 4

# Fallback policy for block-lookup strategies when every complete block is
# skipped or no complete block exists. Supported values:
# "random-index", "first-index", "last-index", "random-block", and "none".
block_lookup_fallback_policy = "random-index"

# Random state-count range for finite-state-machine strategies. Mutation can
# add or remove states within this inclusive range.
fsm_state_count_min = 2
fsm_state_count_max = 6

# Output-index range for FSM states. After the FSM reads its observed bits, the
# output of the final state is the chosen target index.
fsm_output_index_min = 0
fsm_output_index_max = 10

# Offset and fallback ranges for FSMs that use accepting states. On acceptance,
# the target index is acceptance_index + state_output + fsm_index_offset.
fsm_index_offset_min = -10
fsm_index_offset_max = 10
fsm_fallback_index_min = 0
fsm_fallback_index_max = 10

# Monte Carlo trials used to score each A/B strategy pair. Higher values reduce
# random noise in survival estimates but increase runtime.
trials_per_pair = 10000

# Finite sequence length used to simulate unbounded first-pattern observation.
# A first-pattern strategy searches this generated sequence for its pattern.
sequence_length = 1000

# Number of evolutionary generations to run. Generation 0 is the initial
# population evaluation.
generations = 20

# Highest-scoring strategies preserved unchanged in each population.
elite_count = 2

# Higher values kill weak strategies more aggressively. Recommended value: 2.0.
selection_pressure = 2.0

# Relative chance that a generated child is created by mutation.
mutation_rate = 0.65

# Relative chance that a generated child is created by compatible uniform
# crossover. Compatible partners are selected with survival-ratio weighting.
crossover_rate = 0.25

# Relative chance that a generated child is created by joining genes/pattern bits
# from compatible parents. Compatible partners are selected with
# survival-ratio weighting.
gene_join_rate = 0.10

# Per-gene or per-pattern-bit mutation probability.
gene_mutation_probability = 0.05

# Maximum number of children a strategy may produce before it dies and is
# removed from the active population.
max_children_per_strategy = 4

# Probability that mutation changes observed_length, and for gene-table
# strategies also changes target_choice_range by 1.
structure_mutation_probability = 0.15

# Freeze observed_length during mutation. Seed and random initialization can
# still assign observed_length.
disable_observed_length_mutation = true

# Freeze fallback_index during mutation. Seed and random initialization can
# still assign fallback_index.
disable_fallback_index_mutation = true

# Small denominator guard used when normalizing survival ratios.
epsilon = 1e-12

# Success condition. Supported values: "same-bit" and "both-one".
success_condition = "same-bit"

# Strategy type used for randomly generated population slots. Supported values:
# "first-pattern", "gene-table", "block-lookup", and "fsm".
default_strategy_type = "first-pattern"

# Directory where CSV, JSON, score matrices, and population snapshots are saved.
output_dir = "ga_output"

# Set this to an integer for reproducible runs, or leave it omitted for random runs.
# seed = 1

# Seed strategies for generation 0. If a side has seed strategies, generation 0
# is exactly the expanded seed population and is not randomly filled. If a side
# has no seeds, it is randomly filled to the configured population size.
#
# Seed fields:
# - id: human-readable strategy identifier used in reports and artifacts.
# - population: number of generation-0 copies to create from this strategy.
# - strategy_type: "first-pattern", "gene-table", "block-lookup", or "fsm".
# - observed_length: optional for first-pattern; 0 or omitted means unbounded.
# - target_choice_range: gene-table only; exclusive upper bound for gene values.
# - fallback_index: optional for first-pattern; used when pattern is absent.
# - index_offset: optional for first-pattern; added to occurrence index.
# - occurrence_number: optional for first-pattern; 1 first occurrence, 2 second.
# - pattern: for first-pattern, the bit pattern to search for.
# - genes: for gene-table, one target index for each possible observed prefix.
# - block_size: for block-lookup, size of consecutive bit blocks.
# - skip_blocks: for block-lookup, integer block values to skip.
# - lookup_offsets: for block-lookup, local offset per block value.
# - fallback_policy: for block-lookup, fallback when no block is selected.
# - fsm_state_count: for FSM, number of states.
# - fsm_start_state: for FSM, state used before reading observed bits.
# - fsm_outputs: for FSM, target index emitted by each state.
# - fsm_transitions: for FSM, one [next_on_0, next_on_1] row per state.
# - fsm_accepting_states: for FSM, states that immediately choose a target.
# - fsm_index_offset: for accepting FSMs, added to acceptance index and output.
# - fsm_fallback_index: for accepting FSMs, used when no accepting state is hit.

